<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Aba</title>
    <link rel="icon" href="/icon.png">
    <link rel="stylesheet" href="newtab.css">
    <script type="module" src="newtab.js"></script>
</head>
<body>
    <main>
        <div class="weather"> 
            <div class="weather-bar">
                <a class="weatherinfo">
                    <div class="weatherIconCol"> <span class="weatherIcon"></span></div>
                </a>
            </div> 
        </div>

        <div id="search-wrapper">

            <section id="firefox-image-wordmark"> 
                <div class="image"></div>
                <div class="wordmark"></div>
            </section>

            <form id="search-bar" action="https://www.google.com/search" method="GET">
                <input id="search" name="q" placeholder="Pesquise com Google ou digite um endereço">
            </form>

        </div>

        <section id="bars">
            <div id="youtube" class="info-bar"></div>
            <div id="agenda" class="info-bar"></div>
            <div id="twitch" class="info-bar"></div>
        </section>

        <section id="Vertical-Twitch">

        </section>
    </main>
</body>
</html>
