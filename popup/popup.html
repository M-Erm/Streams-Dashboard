<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>

<div id="popup-content">

    <header id="popup-header">
        <button id="back-btn" class="icon-btn hidden">&#8592;</button>
        <h1 id="popup-title">VTubers Dashboard</h1>
        <button id="close-btn" class="icon-btn">&#10005;</button>
    </header>

    <div id="view-default" class="view active">

        <section class="action-buttons">
            <button class="action-btn" data-target="view-channels">Enable / Disable Channels</button>

            <div class="toggle-row">
                <span class="toggle-label">Sort by Branch</span>
                <button class="toggle-btn" id="sort-by-branch" data-on="false">
                    <span class="toggle-track"><span class="toggle-thumb"></span></span>
                </button>
            </div>

            <button class="action-btn" data-target="view-layout">Layout Options</button>
        </section>

        <div class="divider"></div>

        <section class="bar-toggles">
            <label class="check-row"><input type="checkbox" id="youtube-streams" checked><span>Youtube Streams</span></label>
            <label class="check-row"><input type="checkbox" id="agenda" checked><span>Agenda</span></label>
            <label class="check-row"><input type="checkbox" id="twitch-streams" checked><span>Streams Twitch</span></label>
        </section>

    </div>

    <div id="view-channels" class="view">

        <section class="channel-section">
            <h2 class="section-label">YouTube VTubers <span class="hint">Left click: toggle · Right click: pin</span></h2>
            <div id="yt-channel-grid" class="channel-grid">
            </div>
        </section>

        <section class="channel-section">
            <h2 class="section-label">Twitch VTubers</h2>
            <div id="tw-channel-grid" class="channel-grid">
                <div class="channel-card disabled placeholder">
                    <div class="ch-avatar"></div>
                    <span class="ch-name">Coming soon</span>
                </div>
            </div>
        </section>

    </div>

    <div id="view-layout" class="view">

        <section class="layout-options">
            <label class="check-row"><input type="checkbox" id="layout-firefox-logo" checked><span>Firefox Logo</span></label>
            <label class="check-row"><input type="checkbox" id="layout-firefox-wordmark" checked><span>Firefox Wordmark</span></label>
            <label class="check-row"><input type="checkbox" id="layout-search-bar" checked><span>Search Bar</span></label>
            <label class="check-row"><input type="checkbox" id="layout-vertical-twitch"><span>Vertical Twitch Bar</span></label>
            <label class="check-row"><input type="checkbox" id="layout-fixed-bar" checked><span>Fixed Bars</span></label>
            <label class="check-row"><input type="checkbox" id="layout-resizable-bar"><span>Resizable Bars</span></label>
        </section>

    </div>

</div>

<script src="popup.js"></script>
</body>
</html>
